<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async JS</title>
</head>
<body>
    <h1>Js code </h1>
    <button id = "stop">Stop me</button>
</body>
<script>
    const mess = function(){
        console.log('HI async is here ')
     }
     
     const print =setTimeout( mess,2000)
     const stop = document.querySelector('#stop').addEventListener('click', function(){
        clearTimeout(print);
        console.log('stopped')
     })
    
</script>
</html>
