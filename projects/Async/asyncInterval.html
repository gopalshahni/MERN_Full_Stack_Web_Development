<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async JS</title>
</head>
<body>
    <h1>Js code </h1>
    <button id = "start"> Start </button>
    <button id = "stop">Stop </button>
</body>
<script>
    const sayDate = (str) => {
  console.log(str, Date.now());
};

let interval_loop; // declare outside so both handlers can access

document.querySelector('#start').addEventListener('click', () => {
  if (!interval_loop) { // prevent multiple intervals
    interval_loop = setInterval(sayDate, 1000, "hi");
  }
});

document.querySelector('#stop').addEventListener('click', () => {
  clearInterval(interval_loop);
  interval_loop = null; // reset so you can start again
  console.log('stopped interval');
});

</script>
</html>
