<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-weight: bolder;
            font-family: Arial, Helvetica, sans-serif;
        }
    
    h1{
        display: flex;
        justify-content: center;
    }
    .nav{
        background-color: gainsboro;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100px;
        width: auto;
    }
    .nav button{
        height: 50px;
        width: 150px;
        margin: 5px;
    }

    .color-box{
        display: flex;
        justify-content: center;
    }
    .grey{
        background-color: gray;
        height: 100px;
        width: 100px;
        margin: 10px;
    }
    .white{
        background-color: white;
        height: 100px;
        width: 100px;
        margin: 10px;
    }
    .blue{
        background-color: blue;
        height: 100px;
        width: 100px;
        margin: 10px;
    }
    .yellow{
        background-color: yellow;
        height: 100px;
        width: 100px;
        margin: 10px;
    }
</style>
</head>
<body>
    <div class="nav">
        <button>Home</button>
        <button>Youtube Channel</button>
    </div>

    <h1>Color Scheme Switcher</h1>
    <div class="color-box">
        <button class="grey " onclick="changeGray()"></button>
        <button class="white" onclick="changeWhite()"></button>
        <button class="blue" onclick="changeBlue()"></button>
        <button class="yellow" onclick="changeyellow()"></button>
    </div>
    <h1>Try clicking on one of the color above to change the background color of this page!</h1>
</body>
<script>
    function changeGray(){
        document.body.style.backgroundColor = 'gray'
        document.body.style.color = 'black'
    }
    function changeWhite(){
        document.body.style.backgroundColor = 'white'
        document.body.style.color = 'black'
    }
    function changeBlue(){
        document.body.style.backgroundColor = 'blue'
        document.body.style.color = 'white'
    }
    function changeyellow(){
        document.body.style.backgroundColor = 'yellow'
        document.body.style.color = 'orange'
    }
</script>
</html>
