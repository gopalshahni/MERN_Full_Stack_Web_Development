<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Start should change the Background color every second</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
</body>
<script>
    let interval;
     const start = document.querySelector('#start').addEventListener('click', function (){
       if(!interval){
        interval =  setInterval(changecolor,1000);}
        
       console.log('clicked');
    });
     
    const stop = document.querySelector('#stop').addEventListener('click',function(){
        clearInterval(interval)
        document.body.style.backgroundColor = 'white';
        console.log('stopped');
        interval = null;// used in production code , to flush out the variable after user ;
     })


     function changecolor() {
       let color = `#${parseInt(Math.random()*1000)}`
       let colorName =  document.body.style.backgroundColor = color;
        console.log(colorName)
     }

     // anohter and better way to generate color 
     const randomColor =  function(){
        const hex = '0123456789ABCDEF';
        let color = '#'
        for(let i = 0;i<6 ; i++){
            color += hex[Math.floor(Math.random() *16 )]
        }
        return color;
     };
</script>
</html>
