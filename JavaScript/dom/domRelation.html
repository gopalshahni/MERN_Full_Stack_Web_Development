<body style = "background-color: black; color: white;" 
>
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>
</body>
<script>
    const parent = document.querySelector(
    '.parent'
    )

    console.log(parent);
    console.log(parent.children);
     console.log(parent.children[1]);// here we understad the relationship between parent and child node , now we can store this and manipulate this
     let a = document.querySelector('.parent').children[1]// here we accessed the tuesday
    a.style.backgroundColor = "blue";// here we changed the bg color

    console.log(parent.firstElementChild);
    console.log(parent.lastElementChild);
    console.log(parent.nextElementSibling);
    console.log(parent.childNodes);// return the elements couting each elements in the html for ex text comment ,line-break , Child Nodes basically a Node List 
    
    
</script>
